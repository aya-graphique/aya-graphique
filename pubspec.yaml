name: carnet
description: "Carnet — a notebooks & stationery e-commerce app, built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Typography — same faces as the Aya's Graphique brand system
  google_fonts: ^6.2.1

  # Scroll-reveal / entrance animations
  flutter_animate: ^4.5.0

  # Detects when a section scrolls into view, to trigger animations
  visibility_detector: ^0.4.0+2

  # Opens mailto links from the checkout confirmation
  url_launcher: ^6.3.0

  # Supabase backend — product catalog + admin dashboard
  supabase_flutter: ^2.6.0

  # Cart / theme state
  provider: ^6.1.2

  # Persists the light/dark mode choice across app restarts
  shared_preferences: ^2.3.2

  # Order date formatting
  intl: ^0.19.0

  # Lets the admin dashboard upload product photos straight from disk
  file_picker: ^8.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
